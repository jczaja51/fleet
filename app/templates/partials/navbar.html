<header class="topbar">
    <div class="topbar-inner">
        <a href="{{ url_for('main.dashboard') }}" class="brand brand-link">
            <div class="brand-icon">
                <i class="bi bi-car-front-fill"></i>
            </div>
            <div class="brand-text">Fleet Lite</div>
        </a>

        <nav class="main-nav">
            <a
                href="{{ url_for('main.dashboard') }}"
                class="nav-item {% if request.endpoint == 'main.dashboard' or (request.endpoint and request.endpoint.startswith('vehicles.')) %}active{% endif %}"
            >
                <span>Pojazdy</span>
                <i class="bi bi-chevron-down"></i>
            </a>

            <a
                href="{{ url_for('maintenance.list_tasks') }}"
                class="nav-item {% if request.endpoint and request.endpoint.startswith('maintenance.') %}active{% endif %}"
            >
                <span>Serwis</span>
                <i class="bi bi-chevron-down"></i>
            </a>

            <a
                href="{{ url_for('fuel_cards.list_cards') }}"
                class="nav-item {% if request.endpoint and request.endpoint.startswith('fuel_cards.') %}active{% endif %}"
            >
                <span>Karty paliwowe</span>
                <i class="bi bi-chevron-down"></i>
            </a>

            <a href="#" class="nav-item">
                <span>Koszty</span>
                <i class="bi bi-chevron-down"></i>
            </a>

            <a href="#" class="nav-item">
                <span>Alerty</span>
            </a>
        </nav>

        <div class="profile-chip">
            <div class="profile-avatar">
                <i class="bi bi-person-fill"></i>
            </div>
            <span>Admin</span>
            <i class="bi bi-chevron-down"></i>
        </div>
    </div>
</header>
