<div class="empty-state-card">
    <div class="empty-state-icon">
        <i class="bi bi-inbox"></i>
    </div>

    <h3>{{ title }}</h3>
    <p>{{ text }}</p>

    {% if action_url and action_label %}
        <a href="{{ action_url }}" class="btn-primary">
            {{ action_label }}
        </a>
    {% endif %}
</div>
