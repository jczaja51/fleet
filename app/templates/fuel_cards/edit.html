{% extends "base.html" %}
{% block content %}

<main class="page-wrap">
    <div class="page-header">
        <div>
            <h2>Edytuj kartę paliwową</h2>
            <div class="page-subtitle">{{ card.station }} • {{ card.number }}</div>
        </div>

        <a href="{{ url_for('fuel_cards.list_cards') }}" class="btn-secondary">
            ← Wróć
        </a>
    </div>

    <form method="POST" class="form-card">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="form-grid">

            <div class="form-group">
                <label for="station">Stacja</label>
                <input type="text" id="station" name="station" value="{{ card.station or '' }}" required>
            </div>

            <div class="form-group">
                <label for="number">Numer karty</label>
                <input type="text" id="number" name="number" value="{{ card.number or '' }}" required>
            </div>

            <div class="form-group">
                <label for="pin">PIN</label>
                <input type="password" id="pin" name="pin" value="" autocomplete="new-password" placeholder="Wpisz nowy PIN, jeśli chcesz go zmienić">
                <small class="form-help">Ze względów bezpieczeństwa zapisany PIN nie jest wyświetlany.</small>
            </div>

            <div class="form-group">
                <label for="expiry">Data ważności</label>
                    <input
                        type="text"
                        id="expiry"
                        name="expiry"
                        class="js-date-picker"
                        autocomplete="off"
                        value="{{ card.expiry.strftime('%Y-%m-%d') if card.expiry else '' }}"
                    >
            </div>

            <div class="form-group">
                <label for="vehicle_id">Pojazd</label>
                <select id="vehicle_id" name="vehicle_id">
                    <option value="">— brak przypisania —</option>
                    {% for v in vehicles %}
                        <option value="{{ v.id }}" {% if card.vehicle_id == v.id %}selected{% endif %}>
                            {{ v.name }} ({{ v.registration }})
                        </option>
                    {% endfor %}
                </select>
            </div>

        </div>

        <button type="submit" class="btn-primary">Zapisz zmiany</button>
    </form>
</main>

{% endblock %}
