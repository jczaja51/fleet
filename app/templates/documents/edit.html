{% extends "base.html" %}
{% block content %}

<main class="page-wrap">
    <div class="page-header">
        <div>
            <h2>Edytuj dokument</h2>
            <div class="page-subtitle">{{ vehicle.name }} • {{ vehicle.registration }}</div>
        </div>

        <a href="{{ url_for('vehicles.detail', vehicle_id=vehicle.id) }}" class="btn-secondary">
            ← Wróć
        </a>
    </div>

    <form method="POST" enctype="multipart/form-data" class="form-card">
        <div class="form-grid">
            <div class="form-group">
                <label for="name">Nazwa dokumentu</label>
                <input type="text" id="name" name="name" value="{{ document.name }}" required>
            </div>

            <div class="form-group">
                <label for="document_type">Typ dokumentu</label>
                <select id="document_type" name="document_type" required>
                    <option value="oc_policy" {% if document.document_type == "oc_policy" %}selected{% endif %}>Polisa OC</option>
                    <option value="registration_certificate" {% if document.document_type == "registration_certificate" %}selected{% endif %}>Dowód rejestracyjny</option>
                    <option value="inspection_document" {% if document.document_type == "inspection_document" %}selected{% endif %}>Dokument przeglądu</option>
                    <option value="lease_document" {% if document.document_type == "lease_document" %}selected{% endif %}>Dokument leasingowy</option>
                    <option value="other" {% if document.document_type == "other" %}selected{% endif %}>Inny</option>
                </select>
            </div>

            <div class="form-group">
                <label for="expiry_date">Data ważności</label>
                    <input
                        type="text"
                        id="expiry_date"
                        name="expiry_date"
                        class="js-date-picker"
                        autocomplete="off"
                        value="{{ document.expiry_date.strftime('%Y-%m-%d') if document.expiry_date else '' }}"
                    >
            </div>

            <div class="form-group">
                <label for="file">Nowy plik</label>
                <input type="file" id="file" name="file" accept=".pdf,.jpg,.jpeg,.png,.webp">
            </div>
        </div>

        {% if document.file_path %}
            <div style="margin-bottom: 18px;">
                <a href="{{ url_for('static', filename=document.file_path) }}" target="_blank" class="inline-link">
                    Otwórz obecny plik
                </a>
            </div>
        {% endif %}

        <button type="submit" class="btn-primary">Zapisz zmiany</button>
    </form>
</main>

{% endblock %}
